name: Publish

on:
  pull_request_target:
    types:
      - labeled

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Configure Git
        uses: Homebrew/actions/git-user-config@master

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ github.token }}
        run: |
          brew pr-pull --debug \
            --tap=Lenivvenil/onenote-to-obsidian \
            --root-url="https://github.com/${{ github.repository }}/releases/download/${{ github.event.pull_request.title }}" \
            ${{ github.event.pull_request.number }}

      - name: Push commits
        uses: Homebrew/actions/git-try-push@master
        with:
          token: ${{ github.token }}
